# Jekyll Configuration for MCS Labs
title: "Microsoft Copilot Agents Labs"
subtitle: "Hands-on labs for building AI agents"
description: "Hands-on labs for building AI agents with Microsoft Copilot Studio"
baseurl: "/mcs-labs"
url: "https://pratapladhani.github.io"
logo: "/favicon.svg"

# Theme
theme: minimal-mistakes-jekyll
minimal_mistakes_skin: "air"

# Search
search: true
search_full_content: true

# Breadcrumbs
breadcrumbs: true

# Code copy button
enable_copy_code_button: true

# Build settings
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-include-cache

# Kramdown settings
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"

# Site author (shown in sidebar)
author:
  name: "MCS Labs"
  bio: "Hands-on labs for building AI agents with Microsoft Copilot Studio"
  avatar: "/favicon.svg"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/pratapladhani/mcs-labs"

# Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/pratapladhani/mcs-labs"

# Collections
collections:
  labs:
    output: true
    permalink: /:collection/:name/

# Default layouts and front matter
defaults:
  - scope:
      path: ""
      type: "labs"
    values:
      layout: "single"
      author_profile: false
      toc: true
      toc_sticky: true
      toc_label: "On this page"
      toc_icon: "bookmark"
      read_time: true
      share: false
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "single"

# Include favicon files
include:
  - favicon.svg

# Exclude from build
exclude:
  - .github/
  - README.md
  - LICENSE
  - SECURITY.md
  - labs/*/README.md
  - labs/*/local-dist/
  - labs/lab-template.md
