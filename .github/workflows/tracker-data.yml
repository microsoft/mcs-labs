name: Refresh tracker data

on:
  schedule:
    - cron: "*/15 * * * *"
  issues:
    types: [opened, edited, deleted, transferred, pinned, unpinned, closed, reopened, assigned, unassigned, labeled, unlabeled]
  pull_request:
    types: [opened, closed, reopened, labeled, unlabeled]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    if: github.repository == 'microsoft/mcs-labs'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build tracker data snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/build-tracker-data.js assets/data/issues.json

      - name: Compute deltas vs prior snapshot
        run: |
          if git show HEAD:assets/data/issues.json > /tmp/prev.json 2>/dev/null; then
            node -e "
              const fs=require('node:fs');
              const cur=JSON.parse(fs.readFileSync('assets/data/issues.json'));
              const prev=JSON.parse(fs.readFileSync('/tmp/prev.json'));
              cur.stats.deltas = {
                open: cur.stats.open - prev.stats.open,
                closed30d: cur.stats.closed30d - prev.stats.closed30d,
                avgAgeDays: cur.stats.avgAgeDays - prev.stats.avgAgeDays,
                pctTriage: +(cur.stats.pctTriage - prev.stats.pctTriage).toFixed(3),
              };
              fs.writeFileSync('assets/data/issues.json', JSON.stringify(cur, null, 2));
            "
          fi

      - name: Check for meaningful change (ignore generatedAt)
        id: diff
        run: |
          if git show HEAD:assets/data/issues.json > /tmp/prev.json 2>/dev/null; then
            jq 'del(.generatedAt)' /tmp/prev.json > /tmp/prev-clean.json
            jq 'del(.generatedAt)' assets/data/issues.json > /tmp/cur-clean.json
            if diff -q /tmp/prev-clean.json /tmp/cur-clean.json > /dev/null; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Open (or update) a PR with the snapshot change. We can't push direct to main
      # because the repo's "Changes must be made through a pull request" rule blocks
      # the GITHUB_TOKEN. peter-evans/create-pull-request reuses the same branch name
      # across runs, so subsequent refreshes update the existing PR instead of opening
      # new ones.
      - name: Open refresh PR
        if: steps.diff.outputs.changed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: bot/tracker-data-refresh
          delete-branch: true
          commit-message: "chore(tracker): refresh issues snapshot"
          title: "chore(tracker): refresh issues snapshot"
          body: |
            Automated refresh of `assets/data/issues.json` by the `tracker-data` workflow.

            - Source: GitHub Issues GraphQL API
            - Cadence: every 15 min via cron, plus issue/PR events
            - Idempotency: this PR only opens when the snapshot content changes (the workflow diffs against the previous committed snapshot, ignoring `generatedAt`).

            Safe to merge whenever — the change is data-only.
          labels: |
            type: infrastructure

      - name: Enable auto-merge on the refresh PR
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --squash --auto "${{ steps.cpr.outputs.pull-request-number }}" --repo "$GITHUB_REPOSITORY"
