name: Portal Enhancements
description: Report a bug, visual issue, or improvement suggestion for the labs site
labels: ["type: portal-enhancement", "status: triage", "portal"]
body:
  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - Bug / visual issue
        - Suggestion / improvement
        - Question
    validations:
      required: true
  - type: dropdown
    id: page
    attributes:
      label: Which page?
      options:
        - Homepage
        - Labs index (/labs/)
        - Lab detail page
        - Events index (/events/)
        - Event detail page
        - About page (/about/)
        - Backlog tracker (/tracker/)
        - Navigation / sidebar
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What did you notice? Include screenshots if possible.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead? (optional)
  - type: input
    id: browser
    attributes:
      label: Browser / OS
      placeholder: "e.g. Chrome 120 / macOS 14"
