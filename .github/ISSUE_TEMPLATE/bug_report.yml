name: Bug Report
description: Report a problem with a lab
labels: ["type: bug"]
body:
  - type: dropdown
    id: lab
    attributes:
      label: Which lab?
      options:
        - agent-buildathon-1day
        - agent-buildathon-1month
        - agent-builder-m365
        - agent-builder-sharepoint
        - agent-builder-web
        - ask-me-anything
        - ask-me-anything-30-mins
        - autonomous-account-news
        - autonomous-cua
        - autonomous-support-agent
        - azure-ai-workshop
        - bootcamp
        - component-collections
        - contract-alerts-azure-ai
        - copilot-studio-kit
        - core-concepts-agent-knowledge-tools
        - core-concepts-analytics-evaluations
        - core-concepts-variables-agents-channels
        - data-fabric-agent
        - dataverse-mcp-connector
        - guildhall-custom-mcp
        - human-in-the-loop
        - mbr-prep-sharepoint-agent
        - mcp-qualify-lead
        - mcs-alm
        - mcs-byom
        - mcs-governance
        - mcs-in-a-day
        - mcs-multi-agent
        - mcs-tools
        - measure-success
        - pipelines-and-source-control
        - public-website-agent
        - setup-for-success
        - standard-orchestrator
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug you encountered
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Which step in the lab were you on?
      placeholder: |
        1. Go to step X
        2. Follow the instructions
        3. See error...
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem
