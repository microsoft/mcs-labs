<script>
// Set masthead height CSS variable for panels to sit below the header
(function() {
  function setMastheadHeight() {
    var m = document.querySelector('.masthead');
    if (m) document.documentElement.style.setProperty('--masthead-height', m.offsetHeight + 'px');
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', setMastheadHeight);
  else setMastheadHeight();
  window.addEventListener('resize', setMastheadHeight);
})();
</script>
