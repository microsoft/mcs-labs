<script src="https://cdn.botframework.com/botframework-webchat/4.18.0/webchat.js" defer></script>
<script>
(function () {
  'use strict';

  var TOKEN_ENDPOINT = {{ site.data.webchat.tokenEndpoint | jsonify }};

  // Move elements to document.body to escape ancestor stacking contexts
  ['wcTag', 'wcOverlay', 'wcPanel'].forEach(function (id) {
    var el = document.getElementById(id);
    if (el && el.parentElement !== document.body) document.body.appendChild(el);
  });

  // DOM refs
  var tag = document.getElementById('wcTag');
  var overlay = document.getElementById('wcOverlay');
  var panel = document.getElementById('wcPanel');
  var closeBtn = document.getElementById('wcClose');
  var body = document.getElementById('wcBody');
  var loading = document.getElementById('wcLoading');
  var error = document.getElementById('wcError');
  var retryBtn = document.getElementById('wcRetry');
  var status = document.getElementById('wcStatus');
  var sendInput = document.getElementById('wcSendInput');
  var sendBtn = document.getElementById('wcSendBtn');

  var isOpen = false;
  var chatInitializing = false;
  var chatReady = false;
  var chatStore = null;

  // --- Session persistence (per-tab, not a cookie) ---

  var STORAGE_KEY = 'mcs-labs.webchat.v1';
  var STORAGE_SCHEMA_VERSION = 1;
  var ACTIVITY_CAP = 50;
  var TOKEN_FALLBACK_LIFETIME_MS = 55 * 60 * 1000;
  var TOKEN_SAFETY_BUFFER_MS = 60 * 1000;

  var persistedState = null;
  var recentActivities = [];
  var lastWatermark = null;
  var currentToken = null;
  var currentTokenExpiresAt = 0;
  var persistTimer = null;
  var replayedActivityIds = null;
  var fallingBack = false;

  function loadPersistedState() {
    try {
      var raw = sessionStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      var state = JSON.parse(raw);
      if (!state || state.schemaVersion !== STORAGE_SCHEMA_VERSION) {
        clearPersistedState();
        return null;
      }
      if (!state.tokenExpiresAt || state.tokenExpiresAt <= Date.now()) {
        clearPersistedState();
        return null;
      }
      return state;
    } catch (e) {
      clearPersistedState();
      return null;
    }
  }

  function buildStateSnapshot() {
    return {
      schemaVersion: STORAGE_SCHEMA_VERSION,
      token: currentToken,
      tokenExpiresAt: currentTokenExpiresAt,
      watermark: lastWatermark,
      isOpen: isOpen,
      activities: recentActivities.slice(-ACTIVITY_CAP),
      savedAt: Date.now()
    };
  }

  function persistState() {
    if (persistTimer) return;
    persistTimer = setTimeout(function () {
      persistTimer = null;
      flushPersistState();
    }, 200);
  }

  function flushPersistState() {
    if (persistTimer) {
      clearTimeout(persistTimer);
      persistTimer = null;
    }
    if (!currentToken) return;
    try {
      sessionStorage.setItem(STORAGE_KEY, JSON.stringify(buildStateSnapshot()));
    } catch (e) {
      // Quota or serialization error — keep running in-memory.
    }
  }

  function clearPersistedState() {
    try { sessionStorage.removeItem(STORAGE_KEY); } catch (e) {}
  }

  function extractWatermark(activity) {
    if (!activity || !activity.id) return null;
    var parts = String(activity.id).split('|');
    var suffix = parts[parts.length - 1];
    return /^\d+$/.test(suffix) ? suffix : null;
  }

  function pushActivity(activity) {
    if (!activity || !activity.id) return;
    recentActivities.push(activity);
    if (recentActivities.length > ACTIVITY_CAP) {
      recentActivities.splice(0, recentActivities.length - ACTIVITY_CAP);
    }
    var wm = extractWatermark(activity);
    if (wm) lastWatermark = wm;
    persistState();
  }

  // --- Masthead offset: keep panel below the site header at all widths ---

  var mastheadResizeFrame = null;

  function applyMastheadOffset() {
    mastheadResizeFrame = null;
    var masthead = document.querySelector('.masthead');
    var h = masthead ? Math.ceil(masthead.getBoundingClientRect().bottom) : 0;
    document.documentElement.style.setProperty('--wc-panel-top', h + 'px');
  }

  function scheduleMastheadOffset() {
    if (mastheadResizeFrame) return;
    mastheadResizeFrame = requestAnimationFrame(applyMastheadOffset);
  }

  // --- Sendbox disabled state ---

  function setSendboxEnabled(enabled) {
    sendInput.disabled = !enabled;
    sendBtn.disabled = !enabled;
    sendInput.placeholder = enabled
      ? 'Ask about labs, setup, or workshops...'
      : 'Connecting...';
  }

  setSendboxEnabled(false);

  // --- Focus trap ---

  function getFocusableElements() {
    return panel.querySelectorAll(
      'button:not([disabled]), input:not([disabled]), [tabindex]:not([tabindex="-1"])'
    );
  }

  function handleFocusTrap(e) {
    if (e.key !== 'Tab' || !isOpen) return;
    var focusable = getFocusableElements();
    if (focusable.length === 0) return;
    var first = focusable[0];
    var last = focusable[focusable.length - 1];
    if (e.shiftKey) {
      if (document.activeElement === first) { e.preventDefault(); last.focus(); }
    } else {
      if (document.activeElement === last) { e.preventDefault(); first.focus(); }
    }
  }

  // --- Panel toggle ---

  // Remove overlay — lab assistant should not block page interaction
  if (overlay && overlay.parentNode) overlay.parentNode.removeChild(overlay);

  // Start inert — panel is aria-hidden=true initially. `inert` pulls focusable
  // children out of the tab order so keyboard users don't Tab into the hidden
  // panel. Toggled in open()/close().
  panel.inert = true;

  function open() {
    isOpen = true;
    panel.classList.add('wc-panel--open');
    tag.classList.add('wc-tag--hidden');
    document.documentElement.setAttribute('data-panel-open', '');
    tag.setAttribute('aria-expanded', 'true');
    panel.setAttribute('aria-hidden', 'false');
    panel.inert = false;
    panel.addEventListener('keydown', handleFocusTrap);
    if (!chatInitializing && !chatReady) initChat();
    else if (chatReady) sendInput.focus();
    persistState();
  }

  function close() {
    isOpen = false;
    panel.classList.remove('wc-panel--open');
    tag.classList.remove('wc-tag--hidden');
    document.documentElement.removeAttribute('data-panel-open');
    tag.setAttribute('aria-expanded', 'false');
    panel.setAttribute('aria-hidden', 'true');
    panel.inert = true;
    panel.removeEventListener('keydown', handleFocusTrap);
    tag.focus();
    persistState();
  }

  tag.addEventListener('click', open);
  // No manual Enter/Space handler: #wcTag is now a native <button>, which
  // activates on Enter/Space via the user-agent.
  closeBtn.addEventListener('click', close);

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && isOpen) close();
  });

  // --- Custom send box ---

  function sendMessage() {
    var text = sendInput.value.trim();
    if (!text || !chatStore || !chatReady) return;
    chatStore.dispatch({
      type: 'WEB_CHAT/SEND_MESSAGE',
      payload: { text: text }
    });
    sendInput.value = '';
    sendInput.focus();
  }

  sendBtn.addEventListener('click', sendMessage);
  sendInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // --- Chat initialization (lazy, on first open) ---

  function waitForWebChat() {
    return new Promise(function (resolve) {
      if (window.WebChat) return resolve();
      var check = setInterval(function () {
        if (window.WebChat) { clearInterval(check); resolve(); }
      }, 100);
    });
  }

  async function initChat(resumeState) {
    if (chatInitializing) return;
    chatInitializing = true;
    chatReady = false;
    loading.style.display = '';
    error.style.display = 'none';
    status.textContent = 'Connecting...';
    setSendboxEnabled(false);

    try {
      await waitForWebChat();

      var token;
      if (resumeState && resumeState.token && resumeState.tokenExpiresAt > Date.now()) {
        token = resumeState.token;
        currentTokenExpiresAt = resumeState.tokenExpiresAt;
      } else {
        var res = await fetch(TOKEN_ENDPOINT);
        if (!res.ok) throw new Error('Token request failed (' + res.status + ')');
        var data = await res.json();
        token = data.token;
        var lifetimeMs = (typeof data.expires_in === 'number' && data.expires_in > 0)
          ? (data.expires_in * 1000) - TOKEN_SAFETY_BUFFER_MS
          : TOKEN_FALLBACK_LIFETIME_MS;
        currentTokenExpiresAt = Date.now() + lifetimeMs;
      }
      currentToken = token;

      var directLineOpts = { token: token };
      if (resumeState && resumeState.watermark) {
        directLineOpts.watermark = resumeState.watermark;
        lastWatermark = resumeState.watermark;
      }
      var directLine = window.WebChat.createDirectLine(directLineOpts);

      // Typing indicator state
      var typingTimer = null;
      var typingEl = document.getElementById('wcTyping');

      function showTyping() {
        typingEl.classList.add('wc-typing--visible');
        clearTimeout(typingTimer);
        typingTimer = setTimeout(function () {
          typingEl.classList.remove('wc-typing--visible');
        }, 5000);
      }

      function hideTyping() {
        clearTimeout(typingTimer);
        typingEl.classList.remove('wc-typing--visible');
      }

      var store = window.WebChat.createStore({}, function () {
        return function (next) {
          return function (action) {
            var result = next(action);

            // Handle post-dispatch side effects (avoids dispatch-in-dispatch)
            if (action.type === 'DIRECT_LINE/CONNECT_FULFILLED') {
              status.textContent = 'Online';
              chatReady = true;
              setSendboxEnabled(true);
              sendInput.focus();
              // Only fire startConversation for brand-new sessions; reconnects
              // already have the bot's greeting in the cached transcript.
              if (!resumeState) {
                setTimeout(function () {
                  store.dispatch({
                    type: 'WEB_CHAT/SEND_EVENT',
                    payload: { name: 'startConversation', type: 'event', value: '' }
                  });
                }, 0);
              }
              persistState();
            }

            if (action.type === 'DIRECT_LINE/CONNECT_REJECTED') {
              status.textContent = 'Disconnected';
              chatReady = false;
              setSendboxEnabled(false);
              if (resumeState && !fallingBack) {
                fallingBack = true;
                clearPersistedState();
                currentToken = null;
                recentActivities = [];
                lastWatermark = null;
                chatInitializing = false;
                setTimeout(function () { initChat(); }, 0);
              }
            }

            if (action.type === 'DIRECT_LINE/DISCONNECT_FULFILLED') {
              status.textContent = 'Disconnected';
              chatReady = false;
              setSendboxEnabled(false);
            }

            if (action.type === 'DIRECT_LINE/INCOMING_ACTIVITY') {
              var activity = action.payload.activity;
              if (activity.from && activity.from.role === 'bot') {
                if (activity.type === 'typing') {
                  showTyping();
                } else {
                  hideTyping();
                }
              }
              if (activity.type !== 'typing' && activity.id &&
                  !(replayedActivityIds && replayedActivityIds.has(activity.id))) {
                pushActivity(activity);
              }
            }

            return result;
          };
        };
      });

      chatStore = store;

      var styleOptions = {
        backgroundColor: '#faf9f8',
        rootHeight: '100%',
        rootWidth: '100%',

        primaryFont: "'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif",

        botAvatarInitials: '',
        userAvatarInitials: '',
        showAvatarInGroup: false,
        avatarSize: 0,

        bubbleBackground: 'rgba(0, 0, 0, 0.04)',
        bubbleBorderColor: 'transparent',
        bubbleBorderRadius: 14,
        bubbleTextColor: '#3b3a39',

        bubbleFromUserBackground: 'rgba(0, 120, 212, 0.08)',
        bubbleFromUserBorderColor: 'transparent',
        bubbleFromUserBorderRadius: 14,
        bubbleFromUserTextColor: '#1a3a5c',

        hideSendBox: true,
        hideUploadButton: true,

        suggestedActionBackgroundColor: '#ffffff',
        suggestedActionBorderColor: '#0078d4',
        suggestedActionTextColor: '#0078d4',
        suggestedActionBorderRadius: 100,
        suggestedActionHeight: 32,

        timestampColor: '#a19f9d',
        groupTimestamp: 30000,
      };

      // Clear any prior mount before rendering
      body.innerHTML = '';

      window.WebChat.renderWebChat(
        { directLine: directLine, store: store, styleOptions: styleOptions },
        body
      );

      // Replay cached transcript so the user sees prior messages immediately.
      if (resumeState && resumeState.activities && resumeState.activities.length) {
        replayedActivityIds = new Set();
        recentActivities = resumeState.activities.slice();
        for (var i = 0; i < resumeState.activities.length; i++) {
          var a = resumeState.activities[i];
          if (!a || !a.id) continue;
          replayedActivityIds.add(a.id);
          store.dispatch({
            type: 'DIRECT_LINE/INCOMING_ACTIVITY',
            payload: { activity: a }
          });
        }
      }

      loading.style.display = 'none';

    } catch (err) {
      console.error('WebChat init failed:', err);
      body.innerHTML = '';
      loading.style.display = 'none';
      error.style.display = '';
      status.textContent = 'Error';
      chatInitializing = false;
      chatReady = false;
      if (resumeState && !fallingBack) {
        fallingBack = true;
        clearPersistedState();
        currentToken = null;
        recentActivities = [];
        lastWatermark = null;
        initChat();
      }
    }
  }

  retryBtn.addEventListener('click', function () {
    clearPersistedState();
    currentToken = null;
    recentActivities = [];
    lastWatermark = null;
    if (!chatInitializing) initChat();
  });

  // --- Restore session state on page load ---

  applyMastheadOffset();
  window.addEventListener('resize', scheduleMastheadOffset);
  window.addEventListener('load', applyMastheadOffset);

  window.addEventListener('pagehide', flushPersistState);

  persistedState = loadPersistedState();
  if (persistedState) {
    currentToken = persistedState.token;
    currentTokenExpiresAt = persistedState.tokenExpiresAt;
    lastWatermark = persistedState.watermark || null;
    recentActivities = (persistedState.activities || []).slice();
    if (persistedState.isOpen) {
      isOpen = true;
      panel.classList.add('wc-panel--open');
      tag.classList.add('wc-tag--hidden');
      document.documentElement.setAttribute('data-panel-open', '');
      tag.setAttribute('aria-expanded', 'true');
      panel.setAttribute('aria-hidden', 'false');
      panel.inert = false;
      panel.addEventListener('keydown', handleFocusTrap);
      initChat(persistedState);
    }
  }

  // Drop the wc-restore suppressor after the first paint so user-triggered
  // open/close still animates normally within this page's lifetime.
  requestAnimationFrame(function () {
    requestAnimationFrame(function () {
      document.documentElement.classList.remove('wc-restore');
    });
  });
})();
</script>
