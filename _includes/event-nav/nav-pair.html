<!-- Bottom Previous / Next lab cards. Rendered at the end of the lab content
     by _layouts/lab.html. Hidden by default; the event-nav IIFE unhides +
     populates when an active event context is resolved. -->
<nav class="event-navpair" id="event-navpair" aria-label="Previous and next lab" hidden>
  <a class="event-navpair-card event-navpair-prev" id="event-navpair-prev" href="#">
    <span class="event-navpair-dir">&lsaquo;&nbsp;Previous</span>
    <span class="event-navpair-title" id="event-navpair-prev-title"></span>
    <span class="event-navpair-desc" id="event-navpair-prev-desc"></span>
  </a>
  <a class="event-navpair-card event-navpair-next" id="event-navpair-next" href="#">
    <span class="event-navpair-dir">Next&nbsp;&rsaquo;</span>
    <span class="event-navpair-title" id="event-navpair-next-title"></span>
    <span class="event-navpair-desc" id="event-navpair-next-desc"></span>
  </a>
</nav>
