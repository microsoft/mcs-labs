<!-- GitHub-style callout converter -->
<script>
(function() {
  document.querySelectorAll('blockquote').forEach(function(bq) {
    var first = bq.querySelector('p');
    if (!first) return;
    var html = first.innerHTML;
    var match = html.match(/^\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]/i);
    if (!match) return;
    var type = match[1].toLowerCase();
    var cls = {note:'info',tip:'success',important:'warning',warning:'danger',caution:'danger'};
    first.innerHTML = html.replace(match[0], '<strong>'+type.charAt(0).toUpperCase()+type.slice(1)+':</strong>');
    bq.className = 'notice notice--' + (cls[type] || 'info');
  });
})();
</script>
<!-- TOC push-panel toggle -->
<script>
(function() {
  var sidebar = document.querySelector('.sidebar__right');
  if (!sidebar) return;
  var btn = document.createElement('button');
  btn.className = 'toc-toggle';
  btn.innerHTML = '<i class="fas fa-list-ul"></i> Contents';
  btn.setAttribute('aria-label', 'Toggle table of contents');
  document.body.appendChild(btn);
  btn.addEventListener('click', function() {
    document.body.classList.toggle('toc-open');
  });
})();
</script>
<!-- External links open in new tab -->
<script>
(function() {
  var host = location.hostname;
  document.querySelectorAll('a[href^="http"]').forEach(function(a) {
    if (a.hostname !== host) {
      a.setAttribute('target', '_blank');
      a.setAttribute('rel', 'noopener noreferrer');
    }
  });
})();
</script>
