<!-- Dark mode toggle handler -->
<script>
(function() {
  var btn = document.querySelector('.dark-toggle');
  if (!btn) return;
  var html = document.documentElement;

  function setTheme(mode) {
    html.setAttribute('data-theme', mode);
    localStorage.setItem('theme', mode);
    btn.innerHTML = mode === 'dark'
      ? '<i class="fas fa-sun"></i>'
      : '<i class="fas fa-moon"></i>';
  }

  // Initialize icon
  var current = html.getAttribute('data-theme') || 'light';
  btn.innerHTML = current === 'dark'
    ? '<i class="fas fa-sun"></i>'
    : '<i class="fas fa-moon"></i>';

  btn.addEventListener('click', function() {
    var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    setTheme(next);
  });
})();
</script>

<!-- GitHub-style callout converter → MM notice classes -->
<script>
(function() {
  document.querySelectorAll('blockquote').forEach(function(bq) {
    var first = bq.querySelector('p');
    if (!first) return;
    var html = first.innerHTML;
    var match = html.match(/^\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]/i);
    if (!match) return;
    var type = match[1].toLowerCase();
    var cls = { note: 'info', tip: 'success', important: 'warning', warning: 'danger', caution: 'danger' };
    first.innerHTML = html.replace(match[0], '<strong>' + type.charAt(0).toUpperCase() + type.slice(1) + ':</strong>');
    bq.className = 'notice notice--' + (cls[type] || 'info');
  });
})();
</script>

<!-- External link handler -->
<script>
(function() {
  var host = location.hostname;
  document.querySelectorAll('a[href^="http"]').forEach(function(a) {
    if (a.hostname !== host) {
      a.setAttribute('target', '_blank');
      a.setAttribute('rel', 'noopener noreferrer');
    }
  });
})();
</script>
