# MCS in a Day — 1-day condensed agenda. Matches Day 1 of the Bootcamp.
# Lab rows carry a short `title:` override for the event-friendly name;
# the full lab title still lives in _labs/<slug>.md and is used outside
# of event contexts. Module decks are shared with the Bootcamp since
# MCS in a Day is Day 1 of the Bootcamp content.

