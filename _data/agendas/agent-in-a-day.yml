event_id: agent-in-a-day

# Agent in a Day — 1-day hands-on agenda.
# Module items reference first-class module entities in the _modules collection;
# lab rows reference labs in _labs/<slug>.md. Both carry a short event-friendly
# `title:` override; the full lab/module title still lives in its own file.
# Module slide decks resolve automatically from each module's `slides:` front
# matter, so no `slides:` lines are needed here.

schedule:
  - type: session
    title: "Welcome + Kickoff"
    description: "Meet your instructor, review the day, and set expectations."
    label: "Welcome"
    time: "09:00"
    duration: 15

  - type: session
    title: "Introduction to Hands-On Labs"
    description: "Overview of the lab environment, setup instructions, and how the day flows."
    label: "Intro"
    time: "09:15"
    duration: 15

  - type: module
    slug: agent-builder
    label: "Module 1"
    title: "M365 Agent Builder"
    time: "09:30"
    duration: 30

  - type: break
    title: "Coffee break / Q&A"
    time: "10:00"
    duration: 15

  - type: lab
    slug: agent-builder-m365
    label: "Lab 1"
    title: "M365 Agent Builder"
    time: "10:15"
    duration: 30

  - type: module
    slug: core-concepts-part1
    label: "Module 2"
    title: "Copilot Studio Core Concepts - Part 1"
    time: "10:45"
    duration: 30

  - type: lab
    slug: core-concepts-agent-knowledge-tools
    label: "Lab 2"
    title: "Creation, Topics, Knowledge, and Tools"
    time: "11:15"
    duration: 45

  - type: break
    title: "Lunch break"
    time: "12:00"
    duration: 60

  - type: module
    slug: core-concepts-part2
    label: "Module 3"
    title: "Copilot Studio Core Concepts - Part 2"
    time: "13:00"
    duration: 30

  - type: lab
    slug: core-concepts-variables-agents-channels
    label: "Lab 3"
    title: "Variables, Agents, and Channels"
    time: "13:30"
    duration: 30

  - type: break
    title: "Coffee break / Q&A"
    time: "14:00"
    duration: 15

  - type: module
    slug: orchestration
    label: "Module 4"
    title: "Orchestration & Dynamic Chaining"
