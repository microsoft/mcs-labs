event_id: bootcamp

# Architecture Bootcamp — 3-day agenda. "module" items are instructor-led
# modules (rendered as type: session); "day" rows act as headers.
# Lab rows intentionally omit `duration:` so the agenda pill falls back to
# the lab's own declared duration in _labs/<slug>.md. Time is the session
# start slot; the lab's real duration is what we show next to it.
# Source: PR #230 (dewain/air-theme-enhancements), updated to reflect real
# lab durations from the _labs/ collection.

